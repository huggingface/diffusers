name: Test Fetcher (manual dispatch only)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run the fetcher against (e.g. 13664). Leave empty to run against the branch this workflow was dispatched from."
        type: string
        default: ""
      force_full_suite:
        description: "Run the full test suite instead of fetcher selection"
        type: boolean
        default: false

permissions:
  contents: read

env:
  DIFFUSERS_IS_CI: yes
  HF_XET_HIGH_PERFORMANCE: 1
  OMP_NUM_THREADS: 4
  MKL_NUM_THREADS: 4
  PYTEST_TIMEOUT: 60

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check_code_quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || '' }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[quality]
      - name: Check quality
        run: make quality
      - name: Check if failure
        if: ${{ failure() }}
        run: |
          echo "Quality check failed. Please ensure the right dependency versions are installed with 'pip install -e .[quality]' and run 'make style && make quality'" >> $GITHUB_STEP_SUMMARY

  check_repository_consistency:
    needs: check_code_quality
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || '' }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[quality]
      - name: Check repo consistency
        run: |
          python utils/check_copies.py
          python utils/check_dummies.py
          python utils/check_support_list.py
          make deps_table_check_updated
      - name: Check if failure
        if: ${{ failure() }}
        run: |
          echo "Repo consistency check failed. Please ensure the right dependency versions are installed with 'pip install -e .[quality]' and run 'make fix-copies'" >> $GITHUB_STEP_SUMMARY

  setup_pr_tests:
    name: Setup PR Tests
    needs: [check_code_quality, check_repository_consistency]
    runs-on:
      group: aws-general-8-plus
    container:
      image: diffusers/diffusers-pytorch-cpu
      options: --shm-size "16gb" --ipc host -v /mnt/hf_cache:/mnt/cache/
    defaults:
      run:
        shell: bash
    outputs:
      cpu_matrix: ${{ steps.set_matrix.outputs.cpu_matrix }}
      test_map: ${{ steps.set_matrix.outputs.test_map }}
    steps:
    - name: Show dispatch inputs
      run: |
        if [ -n "${{ inputs.pr_number }}" ]; then
          echo "Running fetcher against PR #${{ inputs.pr_number }} (https://github.com/${{ github.repository }}/pull/${{ inputs.pr_number }})"
        else
          echo "Running fetcher against dispatch ref: ${{ github.ref }}"
        fi
        echo "force_full_suite=${{ inputs.force_full_suite }}"
    - name: Checkout diffusers
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || '' }}
        fetch-depth: 0
    - name: Ensure origin/main is locally available
      # `actions/checkout ref: ...` only fetches the named ref. The fetcher diffs HEAD against
      # `origin/main`, so we explicitly fetch main and download its objects.
      run: |
        git -c safe.directory="$GITHUB_WORKSPACE" fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
    - name: Overlay fetcher script from dispatch branch
      # TODO: remove once this workflow's fetcher is on `main`. Until then, dispatching with
      # `pr_number` checks out the PR's merge ref, which contains the PR's (old) version of
      # `utils/tests_fetcher.py`. We overlay the dispatch branch's version so we exercise the
      # fetcher we're trying to validate, not the PR's stale copy. After merge, dispatching from
      # `main` already brings the canonical fetcher, and this step becomes unnecessary.
      if: ${{ inputs.pr_number != '' }}
      env:
        DISPATCH_REF: ${{ github.ref }}
      run: |
        git -c safe.directory="$GITHUB_WORKSPACE" fetch --depth=1 origin "$DISPATCH_REF"
        git -c safe.directory="$GITHUB_WORKSPACE" checkout FETCH_HEAD -- utils/tests_fetcher.py
        git -c safe.directory="$GITHUB_WORKSPACE" diff --stat HEAD -- utils/tests_fetcher.py || true
    - name: Install dependencies
      run: |
        uv pip install -e ".[quality]"
    - name: Environment
      run: |
        diffusers-cli env
        echo $(git --version)
    - name: Fetch Tests
      env:
        FORCE_FULL_SUITE: ${{ inputs.force_full_suite }}
        # Trust the workspace for every git subprocess spawned by gitpython. Without this,
        # `git cat-file --batch-check` aborts on the container-runner ownership mismatch and
        # writes nothing to stdout, which surfaces as "SHA could not be resolved" in the fetcher.
        GIT_CONFIG_COUNT: "1"
        GIT_CONFIG_KEY_0: "safe.directory"
        GIT_CONFIG_VALUE_0: ${{ github.workspace }}
      run: |
        if [ "$FORCE_FULL_SUITE" = "true" ]; then
          python utils/tests_fetcher.py --force_full_suite
        else
          python utils/tests_fetcher.py
        fi
        echo "--- test_map.json ---"
        if [ -f test_map.json ]; then
          cat test_map.json
        else
          echo "(no test_map.json produced)"
        fi
    - id: set_matrix
      name: Create Test Matrix
      run: |
        if [ -f test_map.json ]; then
            cpu_matrix=$(python3 -c 'import json; m = json.load(open("test_map.json")); k = sorted(m.keys()); print(json.dumps(k if k else ["dummy"]))')
            test_map=$(python3 -c 'import json; print(json.dumps(json.load(open("test_map.json"))))')
        else
            cpu_matrix='["dummy"]'
            test_map='{"dummy": ""}'
        fi

        echo "cpu_matrix=$cpu_matrix" >> $GITHUB_OUTPUT
        echo "test_map=$test_map" >> $GITHUB_OUTPUT
        echo "CPU matrix: $cpu_matrix"

  run_pr_tests_cpu:
    name: Run PR Tests (CPU)
    needs: setup_pr_tests
    if: contains(fromJson(needs.setup_pr_tests.outputs.cpu_matrix), 'dummy') != true
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        modules: ${{ fromJson(needs.setup_pr_tests.outputs.cpu_matrix) }}
    runs-on:
      group: aws-general-8-plus
    container:
      image: diffusers/diffusers-pytorch-cpu
      options: --shm-size "16gb" --ipc host -v /mnt/hf_cache:/mnt/cache/
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout diffusers
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || '' }}
        fetch-depth: 2

    - name: Install Dependencies
      run: |
        uv pip install -e ".[quality]"
        uv pip uninstall transformers huggingface_hub && uv pip install --prerelease allow -U transformers@git+https://github.com/huggingface/transformers.git
        uv pip uninstall tokenizers && uv pip install "tokenizers<=0.23.0"
        uv pip uninstall accelerate && uv pip install -U accelerate@git+https://github.com/huggingface/accelerate.git --no-deps

    - name: Environment
      run: |
        diffusers-cli env

    - name: Run selected tests on CPU
      run: |
        pytest -n 4 --max-worker-restart=0 --dist=loadfile \
          -k "not Flax and not Onnx" \
          --make-reports=${{ matrix.modules }}_tests_cpu \
          ${{ fromJson(needs.setup_pr_tests.outputs.test_map)[matrix.modules] }}

    - name: Failure short reports
      if: ${{ failure() }}
      continue-on-error: true
      run: |
        cat reports/${{ matrix.modules }}_tests_cpu_stats.txt
        cat reports/${{ matrix.modules }}_tests_cpu_failures_short.txt

    - name: Test suite reports artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: ${{ matrix.modules }}_cpu_test_reports
        path: reports
