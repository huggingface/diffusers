name: Model Pipeline CI

on:
  schedule:
    - cron: "0 0 1,15 * *"
  workflow_dispatch:

env:
  DIFFUSERS_IS_CI: yes

jobs:
  run_pipelines:
    runs-on: [self-hosted, diffusers_ci]
    container:
      image: diffusers_ci
      options: --ipc host --device=/dev/davinci0 --device=/dev/davinci1
    steps:
      - uses: actions/checkout@v4

      - name: Run all pipelines
        run: |
          python .github/ci_runners/run_pipeline.py \
            --configs .github/ci_runners/configs \
            --output artifacts/run-${GITHUB_RUN_ID}

      - name: Generate report
        if: always()
        run: python .github/ci_runners/report.py --output artifacts/run-${GITHUB_RUN_ID}

      - name: Create issues for failures
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/ci_runners/issue_bot.py --report artifacts/run-${GITHUB_RUN_ID}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-run-${GITHUB_RUN_ID}
          path: artifacts/run-${GITHUB_RUN_ID}/
